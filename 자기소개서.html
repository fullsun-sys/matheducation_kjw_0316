<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자기소개서</title>
    <style>
        body { font-family: 'Noto Sans KR', Arial, sans-serif; margin: 40px; background: #f9f9f9; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        h1 { color: #2d3a4a; }
        hr { margin: 24px 0; }
        .info { font-size: 1.1em; line-height: 2; }
        .desc { margin-top: 24px; font-size: 1.15em; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>자기소개서</h1>
        <div class="info">
            <strong>성명:</strong> 김지원<br>
            <strong>생년월일:</strong> 2003년 4월 9일<br>
            <strong>학교:</strong> 인천대학교<br>
            <strong>학과:</strong> 수학교육과<br>
        </div>
        <hr>
        <div class="desc">
            저는 인천대학교 수학교육과 재학 중인 김지원입니다. 수학, 논리적 사고에 관심이 많습니다.
        </div>
    </div>
</body>
</html>
